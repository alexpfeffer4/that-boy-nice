name: Fetch Player Data

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 1 * *'  # Monthly on the 1st

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Fetch players from BallDontLie API
        run: node fetch-players.js
        env:
          BALLDONTLIE_API_KEY: ${{ secrets.BALLDONTLIE_API_KEY }}

      - name: Commit updated data.js
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data.js
          git diff --staged --quiet || (git commit -m "Update player data from BallDontLie API" && git push)
