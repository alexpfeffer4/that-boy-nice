<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>that boy nice</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #0f3460 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: #fff;
    }

    .container {
      max-width: 600px;
      width: 100%;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
    }

    h1 {
      font-size: 3.5rem;
      font-weight: 900;
      margin-bottom: 8px;
      letter-spacing: -1px;
    }

    .tagline {
      font-size: 0.9rem;
      color: rgba(255,255,255,0.7);
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .game-section {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 30px;
      margin-bottom: 30px;
      backdrop-filter: blur(10px);
    }

    .wheel-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      margin-bottom: 30px;
    }

    .slot-machine {
      perspective: 1000px;
    }

    .reel-window {
      width: 150px;
      height: 150px;
      margin: 0 auto;
      background: rgba(0,0,0,0.8);
      border: 4px solid rgba(255,255,255,0.4);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: inset 0 4px 8px rgba(0,0,0,0.7), 0 8px 32px rgba(0,0,0,0.3);
    }

    .reel-display {
      width: 100px;
      height: 100px;
      object-fit: contain;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5));
      transition: transform 0.05s ease-out;
    }

    .reel-display.spinning {
      animation: reel-spin 2.5s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
    }

    @keyframes reel-spin {
      0% { transform: scale(1) rotateZ(0deg); }
      50% { transform: scale(1.1) rotateZ(-5deg); }
      100% { transform: scale(1) rotateZ(0deg); }
    }

    .wheel-pointer {
      position: absolute;
      top: 10px;
      width: 0;
      height: 0;
      border-left: 10px solid transparent;
      border-right: 10px solid transparent;
      border-top: 20px solid #FF4444;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
    }

    button {
      background: rgba(255,255,255,0.2);
      border: 1px solid rgba(255,255,255,0.3);
      color: #fff;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    button:hover:not(:disabled) {
      background: rgba(255,255,255,0.3);
      transform: translateY(-2px);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .controls {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-bottom: 20px;
    }

    .spin-btn {
      flex: 1;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border: none;
    }

    .respin-btn {
      flex: 1;
      background: rgba(255,215,0,0.3);
      border: 2px solid rgba(255,215,0,0.5);
    }

    .team-display {
      text-align: center;
      margin: 20px 0;
      min-height: 50px;
    }

    .current-team {
      font-size: 2rem;
      font-weight: bold;
      color: #4ECDC4;
    }

    .position-label {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.6);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 4px;
    }

    .input-group {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    input {
      flex: 1;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 1rem;
      transition: all 0.2s;
    }

    input:focus {
      outline: none;
      background: rgba(255,255,255,0.15);
      border-color: rgba(255,255,255,0.4);
    }

    input::placeholder {
      color: rgba(255,255,255,0.5);
    }

    .submit-btn {
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      border: none;
      padding: 12px 32px;
    }

    .lineup-card {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      padding: 20px;
      margin-top: 30px;
    }

    .lineup-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .lineup-item {
      background: rgba(255,255,255,0.05);
      border: 2px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 16px;
      text-align: center;
      min-height: 100px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      transition: all 0.3s;
    }

    .lineup-item.filled {
      border-color: rgba(78, 205, 196, 0.5);
      background: rgba(78, 205, 196, 0.1);
    }

    .position {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.6);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
      font-weight: 600;
    }

    .player-name {
      font-size: 1rem;
      font-weight: bold;
      color: #4ECDC4;
      margin-bottom: 4px;
    }

    .player-score {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.7);
    }

    .total-score {
      background: rgba(255,255,255,0.1);
      border-top: 1px solid rgba(255,255,255,0.1);
      margin-top: 16px;
      padding-top: 16px;
      text-align: center;
    }

    .score-label {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.6);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }

    .total {
      font-size: 2rem;
      font-weight: 900;
      color: #FFD700;
    }

    .error {
      color: #FF6B6B;
      font-size: 0.9rem;
      margin-top: 8px;
    }

    .success {
      color: #4ECDC4;
      font-size: 0.9rem;
      margin-top: 8px;
    }

    .end-screen {
      text-align: center;
    }

    .end-screen h2 {
      font-size: 2rem;
      margin-bottom: 20px;
    }

    .share-btn {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border: none;
      width: 100%;
      margin-top: 20px;
    }

    .center {
      grid-column: span 2;
    }

    @media (max-width: 480px) {
      h1 {
        font-size: 2.5rem;
      }

      .game-section {
        padding: 20px;
      }

      .lineup-grid {
        grid-template-columns: 1fr;
      }

      .center {
        grid-column: span 1;
      }
    }
  </style>
</head>
<body>
  <div class="wheel-pointer"></div>

  <div class="container">
    <header>
      <h1>that boy nice</h1>
      <p class="tagline">NBA Obscurity Lineup Challenge</p>
    </header>

    <div class="game-section" id="gameSection">
      <div class="wheel-container">
        <div class="slot-machine">
          <div class="reel-window" id="reelWindow">
            <img class="reel-display" id="reelDisplay" src="" alt="team logo">
          </div>
        </div>
      </div>

      <div class="controls">
        <button class="spin-btn" id="spinBtn">SPIN WHEEL</button>
        <button class="respin-btn" id="respinBtn" disabled>RE-SPIN (1)</button>
      </div>

      <div class="team-display">
        <div class="current-team" id="currentTeam">—</div>
        <div class="position-label" id="positionLabel">waiting for spin</div>
      </div>

      <div class="input-group">
        <input type="text" id="playerInput" placeholder="Enter player name">
        <button class="submit-btn" id="submitBtn">SUBMIT</button>
      </div>

      <div id="message"></div>

      <div class="lineup-card">
        <div class="lineup-grid" id="lineup">
          <div class="lineup-item" data-position="PG">
            <div class="position">PG</div>
          </div>
          <div class="lineup-item" data-position="SG">
            <div class="position">SG</div>
          </div>
          <div class="lineup-item" data-position="SF">
            <div class="position">SF</div>
          </div>
          <div class="lineup-item" data-position="PF">
            <div class="position">PF</div>
          </div>
          <div class="lineup-item center" data-position="C">
            <div class="position">C</div>
          </div>
          <div class="total-score center">
            <div class="score-label">Total Score</div>
            <div class="total" id="totalScore">0</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="data.js"></script>
  <script>
    // Load players data and initialize game
    let players = playersData || {};
    let gameState = {
      lineup: {},
      totalScore: 0,
      currentTeam: null,
      currentPosition: null,
      respinsLeft: 1,
      spinning: false,
      teams: []
    };

    // Levenshtein distance
    function levenshteinDistance(a, b) {
      const aL = a.length, bL = b.length;
      const dp = Array(bL + 1).fill(0).map(() => Array(aL + 1).fill(0));
      for (let i = 0; i <= aL; i++) dp[0][i] = i;
      for (let j = 0; j <= bL; j++) dp[j][0] = j;
      for (let j = 1; j <= bL; j++) {
        for (let i = 1; i <= aL; i++) {
          const cost = a[i - 1] === b[j - 1] ? 0 : 1;
          dp[j][i] = Math.min(dp[j][i - 1] + 1, dp[j - 1][i] + 1, dp[j - 1][i - 1] + cost);
        }
      }
      return dp[bL][aL];
    }

    function fuzzyMatchPlayer(input, franchisePlayers) {
      const normalized = input.toLowerCase().trim();
      let bestMatch = null;
      let bestDistance = Infinity;
      franchisePlayers.forEach(p => {
        const playerName = p.name.toLowerCase();
        const distance = levenshteinDistance(normalized, playerName);
        if (distance < bestDistance) {
          bestDistance = distance;
          bestMatch = p;
        }
      });
      return bestDistance <= 3 ? bestMatch : null;
    }

    function calculateObscurityScore(player) {
      let score = 100;

      const games = player.careerGames || 0;
      const vorp = player.careerVORP || 0;
      const draftPick = player.draftPick || 0;
      const mvp = player.mvpAwards || 0;
      const fmvp = player.fmvpAwards || 0;
      const dpoy = player.dpoyAwards || 0;
      const allStarApps = player.allStarAppearances || 0;
      const roy = player.royAward || 0;
      const smoy = player.smoyAwards || 0;
      const mip = player.mipAwards || 0;

      if (games < 100) {
        score -= 0;
      } else if (games < 300) {
        score -= 2;
      } else if (games < 500) {
        score -= 5;
      } else if (games < 800) {
        score -= 8;
      } else if (games < 1200) {
        score -= 15;
      } else {
        score -= 25;
      }

      if (vorp < 0) {
        score -= 0;
      } else if (vorp < 5) {
        score -= 5;
      } else if (vorp < 10) {
        score -= 10;
      } else if (vorp < 15) {
        score -= 15;
      } else if (vorp < 20) {
        score -= 18;
      } else if (vorp < 30) {
        score -= 20;
      } else if (vorp < 50) {
        score -= 28;
      } else if (vorp < 80) {
        score -= 40;
      } else {
        score -= 55;
      }

      score -= mvp * 20;
      score -= fmvp * 15;
      score -= dpoy * 12;
      score -= allStarApps * 4;
      score -= roy * 8;
      score -= smoy * 4;
      score -= mip * 3;

      if (draftPick === 1) {
        score -= 20;
      } else if (draftPick <= 3) {
        score -= 15;
      } else if (draftPick <= 14) {
        score -= 10;
      } else if (draftPick <= 30) {
        score -= 5;
      } else if (draftPick <= 60) {
        score -= 2;
      }

      return Math.max(1, Math.min(99, score));
    }

    function loadPlayers() {
      players = playersData;
      gameState.teams = Object.keys(players).sort();
    }

    function buildReel() {
      const display = document.getElementById('reelDisplay');
      if (gameState.teams.length > 0) {
        display.src = getTeamLogo(gameState.teams[0]);
      }
    }

    function getRandomTeam() {
      return gameState.teams[Math.floor(Math.random() * gameState.teams.length)];
    }

    const positions = ['PG', 'SG', 'SF', 'PF', 'C'];
    function getTeamLogo(teamName) {
      // ESPN CDN abbreviations — all verified returning 200
      const espnAbbrs = {
        "Atlanta Hawks": "atl",
        "Boston Celtics": "bos",
        "Brooklyn Nets": "bkn",
        "Charlotte Hornets": "cha",
        "Chicago Bulls": "chi",
        "Cleveland Cavaliers": "cle",
        "Dallas Mavericks": "dal",
        "Denver Nuggets": "den",
        "Detroit Pistons": "det",
        "Golden State Warriors": "gsw",
        "Houston Rockets": "hou",
        "Indiana Pacers": "ind",
        "Los Angeles Clippers": "lac",
        "Los Angeles Lakers": "lal",
        "Memphis Grizzlies": "mem",
        "Miami Heat": "mia",
        "Milwaukee Bucks": "mil",
        "Minnesota Timberwolves": "min",
        "New Orleans Pelicans": "no",
        "New York Knicks": "nyk",
        "Oklahoma City Thunder": "okc",
        "Orlando Magic": "orl",
        "Philadelphia 76ers": "phi",
        "Phoenix Suns": "phx",
        "Portland Trail Blazers": "por",
        "Sacramento Kings": "sac",
        "San Antonio Spurs": "sas",
        "Toronto Raptors": "tor",
        "Utah Jazz": "utah",
        "Washington Wizards": "wsh"
      };
      const abbr = espnAbbrs[teamName];
      return abbr ? `https://a.espncdn.com/i/teamlogos/nba/500/${abbr}.png` : "";
    }

    function getTeamAcronym(teamName) {
      const acronyms = {
        "Atlanta Hawks": "ATL", "Boston Celtics": "BOS", "Brooklyn Nets": "BKN",
        "Charlotte Hornets": "CHA", "Chicago Bulls": "CHI", "Cleveland Cavaliers": "CLE",
        "Dallas Mavericks": "DAL", "Denver Nuggets": "DEN", "Detroit Pistons": "DET",
        "Golden State Warriors": "GSW", "Houston Rockets": "HOU", "Los Angeles Clippers": "LAC",
        "Los Angeles Lakers": "LAL", "Memphis Grizzlies": "MEM", "Miami Heat": "MIA",
        "Milwaukee Bucks": "MIL", "Minnesota Timberwolves": "MIN", "New Orleans Pelicans": "NOP",
        "New York Knicks": "NYK", "Oklahoma City Thunder": "OKC", "Orlando Magic": "ORL",
        "Philadelphia 76ers": "PHI", "Phoenix Suns": "PHX", "Portland Trail Blazers": "POR",
        "Sacramento Kings": "SAC", "San Antonio Spurs": "SAS", "Toronto Raptors": "TOR",
        "Utah Jazz": "UTA", "Washington Wizards": "WAS"
      };
      return acronyms[teamName] || teamName.substring(0, 3).toUpperCase();
    }

    function spinWheel() {
      if (gameState.spinning || Object.keys(gameState.lineup).length === 5) return;
      gameState.spinning = true;
      document.getElementById('spinBtn').disabled = true;
      document.getElementById('respinBtn').disabled = true;
      document.getElementById('playerInput').disabled = true;
      document.getElementById('submitBtn').disabled = true;

      const display = document.getElementById('reelDisplay');
      gameState.currentTeam = getRandomTeam();
      display.classList.add('spinning');

      // Animate cycling through random teams
      let spinCount = 0;
      const spinInterval = setInterval(() => {
        const randomTeam = gameState.teams[Math.floor(Math.random() * gameState.teams.length)];
        display.src = getTeamLogo(randomTeam);
        spinCount++;

        // Stop after ~30 spins
        if (spinCount >= 30) {
          clearInterval(spinInterval);
          display.src = getTeamLogo(gameState.currentTeam);
          display.classList.remove('spinning');

          // Re-enable controls
          updateDisplay();
          document.getElementById('playerInput').disabled = false;
          document.getElementById('playerInput').focus();
          document.getElementById('submitBtn').disabled = false;
          document.getElementById('spinBtn').disabled = false;
          if (gameState.respinsLeft > 0) {
            document.getElementById('respinBtn').disabled = false;
          }
          gameState.spinning = false;

          if (Object.keys(gameState.lineup).length === 5) {
            endGame();
          }
        }
      }, 100);
    }

    function respin() {
      if (gameState.respinsLeft > 0) {
        gameState.respinsLeft--;
        document.getElementById('respinBtn').textContent = `RE-SPIN (${gameState.respinsLeft})`;
        if (gameState.respinsLeft === 0) {
          document.getElementById('respinBtn').disabled = true;
        }
        spinWheel();
      }
    }

    function submitPlayer() {
      const input = document.getElementById('playerInput').value;
      const messageEl = document.getElementById('message');

      if (!input.trim()) {
        messageEl.innerHTML = '<div class="error">Enter a player name</div>';
        return;
      }

      const franchisePlayers = players[gameState.currentTeam];
      const matched = fuzzyMatchPlayer(input, franchisePlayers);

      if (!matched) {
        messageEl.innerHTML = '<div class="error">Player not found on this team</div>';
        return;
      }

      const playerPosition = matched.position;
      if (gameState.lineup[playerPosition]) {
        messageEl.innerHTML = `<div class="error">${playerPosition} slot is already filled</div>`;
        return;
      }

      const score = calculateObscurityScore(matched);
      gameState.lineup[playerPosition] = {
        name: matched.name,
        score: score
      };
      gameState.totalScore += score;

      updateLineup();
      updateScore();

      messageEl.innerHTML = `<div class="success">✓ ${matched.name} added to ${playerPosition}! (+${score} pts)</div>`;
      document.getElementById('playerInput').value = '';

      if (Object.keys(gameState.lineup).length === 5) {
        setTimeout(endGame, 1500);
      } else {
        document.getElementById('spinBtn').disabled = false;
        document.getElementById('playerInput').disabled = true;
        document.getElementById('submitBtn').disabled = true;
      }
    }

    function updateDisplay() {
      document.getElementById('currentTeam').textContent = gameState.currentTeam;
      document.getElementById('positionLabel').textContent = `Name any player`;
      document.getElementById('reelDisplay').src = getTeamLogo(gameState.currentTeam);
    }

    function updateLineup() {
      positions.forEach(pos => {
        const item = document.querySelector(`[data-position="${pos}"]`);
        if (gameState.lineup[pos]) {
          item.classList.add('filled');
          item.innerHTML = `
            <div class="position">${pos}</div>
            <div class="player-name">${gameState.lineup[pos].name}</div>
            <div class="player-score">+${gameState.lineup[pos].score}</div>
          `;
        } else {
          item.classList.remove('filled');
          item.innerHTML = `<div class="position">${pos}</div>`;
        }
      });
    }

    function updateScore() {
      document.getElementById('totalScore').textContent = gameState.totalScore;
    }

    function endGame() {
      document.getElementById('gameSection').innerHTML = `
        <div class="end-screen">
          <h2>🏀 Game Complete!</h2>
          <div class="lineup-card">
            <div class="lineup-grid" id="finalLineup"></div>
          </div>
          <div style="margin-top: 20px; text-align: center;">
            <div class="score-label">Final Score</div>
            <div class="total">${gameState.totalScore}</div>
          </div>
          <button class="share-btn" onclick="shareResult()">SHARE RESULT</button>
          <button class="spin-btn" style="margin-top: 10px;" onclick="location.reload()">PLAY AGAIN</button>
        </div>
      `;

      const finalLineup = document.getElementById('finalLineup');
      positions.forEach(pos => {
        const player = gameState.lineup[pos];
        const div = document.createElement('div');
        div.className = 'lineup-item filled';
        if (pos === 'C') div.classList.add('center');
        div.innerHTML = `
          <div class="position">${pos}</div>
          <div class="player-name">${player.name}</div>
          <div class="player-score">+${player.score}</div>
        `;
        finalLineup.appendChild(div);
      });

      const totalDiv = document.createElement('div');
      totalDiv.className = 'total-score center';
      totalDiv.innerHTML = `
        <div class="score-label">Total</div>
        <div class="total">${gameState.totalScore}</div>
      `;
      finalLineup.appendChild(totalDiv);
    }

    function shareResult() {
      const text = `I scored ${gameState.totalScore} in that boy nice! 🏀 Can you build a better lineup? https://thatboynice.com`;
      navigator.clipboard.writeText(text).then(() => {
        alert('Copied to clipboard!');
      });
    }

    // Event listeners
    document.getElementById('spinBtn').addEventListener('click', spinWheel);
    document.getElementById('respinBtn').addEventListener('click', respin);
    document.getElementById('submitBtn').addEventListener('click', submitPlayer);
    document.getElementById('playerInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') submitPlayer();
    });

    // Initialize
    console.log('Initializing game...');
    console.log('playersData exists:', typeof playersData !== 'undefined');

    loadPlayers();
    console.log('Teams loaded:', gameState.teams.length);

    if (gameState.teams.length > 0) {
      buildReel();
      gameState.currentTeam = gameState.teams[0];
      updateDisplay();
      const input = document.getElementById('playerInput');
      input.disabled = false;
      console.log('Input enabled:', !input.disabled);
    } else {
      console.error('No teams loaded!');
    }
  </script>
</body>
</html>
